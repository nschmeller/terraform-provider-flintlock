name: Integration Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  testacc:
    name: Acceptance Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version-file: 'go.mod'

      - name: Setup Flintlock
        run: |
          wget -qO flintlockd https://github.com/liquidmetal-dev/flintlock/releases/download/v0.9.0/flintlockd_amd64
          chmod +x flintlockd
          sudo bash -c "nohup ./flintlockd run --bridge-name=br0 --insecure > /dev/null 2>&1 &"
          sleep 5

      - name: Integration Test
        env:
          TF_ACC: "1"
        run: |
          go build ./... 
          go test -v ./internal/provider/ -run TestAccVMsDataSource
